<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panth Env-Data Visualizer</title>
    <!-- Chart.js Library -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            margin: 0;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
        }

        .input-section {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #38bdf8;
            padding: 12px;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
            resize: none;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            border-bottom: 3px solid var(--secondary);
        }

        .stat-card small { color: #94a3b8; font-size: 0.8rem; }
        .stat-card div { font-size: 1.5rem; font-weight: bold; margin-top: 5px; }

        .chart-container {
            background: var(--card);
            padding: 20px;
            border-radius: 15px;
            position: relative;
            height: 400px;
        }

        .footer {
            text-align: center;
            margin-top: 40px;
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>PANTH SYSTEM ANALYTICS</h1>
        <p>Paste your Arduino Serial output below to visualize data</p>
    </header>

    <div class="input-section">
        <textarea id="dataInput" placeholder="Paste data here... Example:
--- DATA START ---
{&quot;owner&quot;: &quot;Panth&quot;, &quot;unit&quot;: &quot;Celsius&quot;, &quot;count&quot;: 5, &quot;data&quot;: [22.1, 23.5, 24.2, 23.8, 22.9]}
--- DATA END ---"></textarea>
        <button onclick="processData()">GENERATE GRAPH</button>
    </div>

    <div class="stats-grid" id="statsGrid" style="display: none;">
        <div class="stat-card">
            <small>AVG TEMP</small>
            <div id="avgVal">0°</div>
        </div>
        <div class="stat-card">
            <small>MAX TEMP</small>
            <div id="maxVal" style="color: #fb7185;">0°</div>
        </div>
        <div class="stat-card">
            <small>MIN TEMP</small>
            <div id="minVal" style="color: #38bdf8;">0°</div>
        </div>
        <div class="stat-card">
            <small>SAMPLES</small>
            <div id="countVal">0</div>
        </div>
    </div>

    <div class="chart-container" id="chartBox" style="display: none;">
        <canvas id="tempChart"></canvas>
    </div>

    <div class="footer">
        &copy; Built for Panth Environment Logger
    </div>
</div>

<script>
    let myChart = null;

    function processData() {
        const input = document.getElementById('dataInput').value;
        
        try {
            // Regex to find content between markers
            const regex = /--- DATA START ---\s*([\s\S]*?)\s*--- DATA END ---/g;
            let match;
            let jsonData = null;

            // Find the last valid block in the pasted text
            while ((match = regex.exec(input)) !== null) {
                jsonData = JSON.parse(match[1]);
            }

            if (!jsonData || !jsonData.data || jsonData.data.length === 0) {
                alert("No valid data found! Please make sure you copied the START and END markers.");
                return;
            }

            updateDashboard(jsonData);
        } catch (e) {
            alert("Error parsing JSON: " + e.message);
        }
    }

    function updateDashboard(json) {
        const data = json.data;
        const labels = data.map((_, i) => `${i + 1}m`);

        // Calculate Stats
        const max = Math.max(...data);
        const min = Math.min(...data);
        const avg = data.reduce((a, b) => a + b, 0) / data.length;

        // Update UI
        document.getElementById('statsGrid').style.display = 'grid';
        document.getElementById('chartBox').style.display = 'block';
        
        document.getElementById('maxVal').innerText = max.toFixed(1) + "°C";
        document.getElementById('minVal').innerText = min.toFixed(1) + "°C";
        document.getElementById('avgVal').innerText = avg.toFixed(1) + "°C";
        document.getElementById('countVal').innerText = json.count;

        // Create or Update Chart
        const ctx = document.getElementById('tempChart').getContext('2d');
        
        if (myChart) {
            myChart.destroy();
        }

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Temperature (' + json.unit + ')',
                    data: data,
                    borderColor: '#00f2fe',
                    backgroundColor: 'rgba(79, 172, 254, 0.2)',
                    borderWidth: 3,
                    pointBackgroundColor: '#fff',
                    pointRadius: 4,
                    tension: 0.4, // Makes the line curved
                    fill: true
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false }
                },
                scales: {
                    y: {
                        grid: { color: '#334155' },
                        ticks: { color: '#94a3b8' }
                    },
                    x: {
                        grid: { display: false },
                        ticks: { color: '#94a3b8' }
                    }
                }
            }
        });
    }
</script>

</body>
</html>
